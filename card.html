function rotl32(x,n){return ((x<<n)>>>0)|(x>>>(32-n));}
function qr(a,b,c,d){

function keystream(key32, nonce12, counter, nbytes){

async function pbkdf2(password, saltBytes, rounds){
  const enc=new TextEncoder();
  const km=await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveBits"]);
  const bits=await crypto.subtle.deriveBits({name:"PBKDF2", hash:"SHA-256", salt:saltBytes, iterations:rounds}, km, 512);

async function sha256(u8){return new Uint8Array(await crypto.subtle.digest("SHA-256", u8));}
async function kdf(password, salt){

  let base=await pbkdf2(password, concatU8(enc.encode("VPUB|"), salt), rounds);

async function hmacSha256(keyBytes, msgBytes){
  const k=await crypto.subtle.importKey("raw", keyBytes, {name:"HMAC", hash:"SHA-256"}, false, ["sign"]);
